name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  app:
    name: App build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Type check
        working-directory: app
        run: npm run typecheck --if-present

      - name: Lint
        working-directory: app
        run: npm run lint --if-present

      - name: Unit tests
        working-directory: app
        run: npm run test:unit --if-present

      - name: Build (electron-forge make)
        working-directory: app
        run: npm run make

  firmware:
    name: Firmware build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # No `cache: "pip"` — that requires a lockfile (requirements.txt,
          # pyproject.toml, etc.) at a known path; firmware/ has only
          # platformio.ini, so cache-key resolution fails fast. Re-enable
          # with `cache-dependency-path: firmware/requirements.txt` once we
          # actually pin Python deps.

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Compile firmware
        working-directory: firmware
        run: pio run

  docs:
    name: Docs lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: .github/mlc-config.json
        continue-on-error: true
