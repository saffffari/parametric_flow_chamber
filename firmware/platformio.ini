[platformio]
default_envs = teensy41

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
monitor_speed = 115200
; Default to COM4 (the Teensy's typical enumeration on this bench laptop).
; If the Teensy lands on a different COM port, override at the command line:
;   pio device monitor -p COMx
; or update this line. `pio device list` shows the current Teensy port.
monitor_port = COM4
upload_protocol = teensy-cli
build_flags =
  -D USB_SERIAL
lib_deps =
  ; Bench OLED (Waveshare 1.5" SSD1327 mono, I²C on pins 18/19).
  ; U8g2 ships every SSD1327 init variant; display.cpp picks the WS one.
  olikraus/U8g2@^2.34.0
